name: Generate Profile Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate SVG stats
        env:
          PROFILE_USERNAME: ${{ vars.GITHUB_PROFILE_USERNAME || github.repository_owner }}
          GITHUB_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN != '' && secrets.PRIVATE_STATS_TOKEN || secrets.GITHUB_TOKEN }}
          STATS_OUTPUT: generated/stats.svg
        run: python scripts/stats.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/stats.svg
          if git diff --cached --quiet; then
            echo "Aucun changement à commit."
            exit 0
          fi
          git commit -m "chore: update github profile stats"
          git push
